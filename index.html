<!DOCTYPE html>
<html>
<head>
<title>Special Wish ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-family: Arial;
    overflow: hidden;
}

.wish {
    animation: zoom 2s ease;
    color: white;
}

h1 {
    font-size: 50px;
    text-shadow: 2px 2px 10px #ff1493;
}

p {
    font-size: 25px;
}

@keyframes zoom {
    from {
        transform: scale(0);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

.heart {
    font-size: 60px;
    animation: beat 1s infinite;
}

@keyframes beat {
    50% {
        transform: scale(1.3);
    }
}
</style>

</head>

<body>

<div class="wish">
    <div class="heart">❤️</div>
    <h1>Happy Birthday Amina 🎂</h1>
    <p>May your life always be full of happiness and smiles ✨</p>
</div>


<audio autoplay loop>
    <source src="music.mp3" type="audio/mp3">
</audio>


</body>
</html>
